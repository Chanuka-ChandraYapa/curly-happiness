backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME   # e.g. chanuka/amara-silva-law
  branch: main
  base_url: https://billowing-glitter-9feb.chanukachandrayapa.workers.dev  # filled in step 3 below

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "articles"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select",
          options: ["Commentary", "Case Analysis", "Legal Update", "Opinion", "Publications"],
          default: "Commentary" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Excerpt (shown on homepage — 1–2 sentences)", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Published", name: "published", widget: "boolean", default: true }
